<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Display</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    
    <style>
        :root {
            --led-color: #ffb000;
            --led-dim: #4a3b00;
            --led-off: #1a1500;
        }
        
        body {
            background-color: #050505;
            font-family: 'Pixelify Sans', monospace;
            overflow: hidden; 
        }

        /* LED Grid Simulation */
        .led-matrix {
            background-image: 
                radial-gradient(#000 40%, transparent 45%),
                radial-gradient(#000 40%, transparent 45%);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
        }

        /* Glow Effects */
        .led-glow {
            text-shadow: 0 0 5px var(--led-color), 0 0 10px var(--led-color);
        }
        
        .led-text-red {
            color: #ef4444;
            text-shadow: 0 0 5px #ef4444, 0 0 10px #991b1b;
        }

        .led-text-green {
            color: #22c55e;
            text-shadow: 0 0 5px #22c55e, 0 0 10px #15803d;
        }

        .led-text-amber {
            color: var(--led-color);
            text-shadow: 0 0 5px var(--led-color);
        }

        /* Scanline Overlay */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-center p-4 selection:bg-amber-500 selection:text-black">

    <!-- Board Casing -->
    <main class="relative w-full max-w-6xl bg-neutral-900 rounded-lg p-2 shadow-2xl border border-neutral-800">
        
        <!-- Screen Bezel -->
        <div class="relative bg-black rounded border-4 border-neutral-800 overflow-hidden shadow-[inset_0_0_20px_rgba(0,0,0,1)]">
            
            <!-- Matrix Texture Overlay -->
            <div class="absolute inset-0 led-matrix z-10 pointer-events-none opacity-40"></div>
            <div class="absolute inset-0 scanlines z-20 pointer-events-none opacity-20"></div>
            <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent z-30 pointer-events-none mix-blend-overlay"></div>

            <!-- Content Area -->
            <div class="relative z-0 p-6 crt-flicker min-h-[600px] flex flex-col">
                
                <!-- Header -->
                <header class="flex justify-between items-end mb-8 border-b-2 border-neutral-800 pb-4">
                    <div class="flex items-center gap-4">
                        <iconify-icon icon="solar:plane-linear" class="text-amber-500 text-5xl led-glow"></iconify-icon>
                        <div>
                            <h1 class="text-4xl tracking-tight text-amber-500 led-glow uppercase font-bold">Departures</h1>
                            <div class="flex items-center gap-2 text-neutral-500 text-sm tracking-widest mt-1">
                                <span class="uppercase">Terminal 1</span>
                                <span>//</span>
                                <span id="current-date"></span>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div id="clock" class="text-5xl text-amber-500 led-glow font-medium tracking-widest">00:00</div>
                        <div class="text-xs text-neutral-600 uppercase tracking-[0.2em] mt-2">Local Time</div>
                    </div>
                </header>

                <!-- Table Headers -->
                <div class="grid grid-cols-12 gap-4 text-neutral-600 text-sm uppercase tracking-widest mb-4 border-b border-neutral-900 pb-2 px-2">
                    <div class="col-span-2">Time</div>
                    <div class="col-span-4">Destination</div>
                    <div class="col-span-2">Flight</div>
                    <div class="col-span-1 text-center">Gate</div>
                    <div class="col-span-3 text-right">Remarks</div>
                </div>

                <!-- Flight List Container -->
                <ul id="flight-board" class="flex flex-col gap-3 flex-grow overflow-hidden">
                    <!-- Rows injected by JS -->
                </ul>

                <!-- Footer Status -->
                <div class="mt-auto pt-6 flex justify-between items-center text-xs text-neutral-700 uppercase tracking-widest border-t border-neutral-900">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        System Online
                    </div>
                    <div>Page 01 / 01</div>
                </div>
            </div>
        </div>
        
        <!-- Hardware Screws -->
        <div class="absolute top-2 left-2 w-2 h-2 rounded-full bg-neutral-700 shadow-inner"></div>
        <div class="absolute top-2 right-2 w-2 h-2 rounded-full bg-neutral-700 shadow-inner"></div>
        <div class="absolute bottom-2 left-2 w-2 h-2 rounded-full bg-neutral-700 shadow-inner"></div>
        <div class="absolute bottom-2 right-2 w-2 h-2 rounded-full bg-neutral-700 shadow-inner"></div>
    </main>

    <script>
        // Data Source
        const destinations = [
            "TOKYO-HANEDA", "NEW YORK-JFK", "LONDON-LHR", "SINGAPORE", "DUBAI", 
            "PARIS-CDG", "SYDNEY", "FRANKFURT", "MUMBAI", "LOS ANGELES", 
            "HONG KONG", "AMSTERDAM", "ISTANBUL", "DOHA", "SEOUL-ICN",
            "TORONTO", "ZURICH", "MUNICH", "CHICAGO-ORD", "SHANGHAI-PVG"
        ];
        
        const statuses = [
            { text: "ON TIME", color: "led-text-green" },
            { text: "BOARDING", color: "led-text-green" },
            { text: "DELAYED", color: "led-text-red" },
            { text: "CANCELLED", color: "led-text-red" },
            { text: "GATE OPEN", color: "led-text-amber" },
            { text: "FINAL CALL", color: "led-text-red" }
        ];

        // State
        const maxRows = 8;
        let currentFlights = [];
        
        // Utils
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
        const padZero = (num) => num.toString().padStart(2, '0');
        
        function generateFlight() {
            const now = new Date();
            const future = new Date(now.getTime() + randomInt(10, 300) * 60000);
            const airlineCode = ["BA", "JL", "SQ", "QF", "EK", "LH", "AF", "UA", "NH"][randomInt(0, 8)];
            
            // Bias towards 'On Time'
            let statusObj = Math.random() > 0.7 ? statuses[randomInt(0, statuses.length - 1)] : statuses[0];

            return {
                id: Math.random().toString(36).substr(2, 9),
                time: `${padZero(future.getHours())}:${padZero(future.getMinutes())}`,
                city: destinations[randomInt(0, destinations.length - 1)],
                flight: `${airlineCode} ${randomInt(100, 9999)}`,
                gate: `${String.fromCharCode(65 + randomInt(0, 5))}${randomInt(1, 20)}`,
                status: statusObj.text,
                statusColor: statusObj.color
            };
        }

        // Initialize Data
        for(let i = 0; i < maxRows; i++) {
            currentFlights.push(generateFlight());
        }
        
        // Sorting flights by time
        currentFlights.sort((a,b) => a.time.localeCompare(b.time));

        // Render Initial Board
        const boardEl = document.getElementById('flight-board');
        
        function createRowHTML(flight) {
            return `
                <li class="grid grid-cols-12 gap-4 text-xl md:text-2xl items-center px-2 py-1 border-b border-neutral-900/50 bg-neutral-900/20" data-id="${flight.id}">
                    <div class="col-span-2 font-medium led-text-amber tracking-widest scramble-text" data-value="${flight.time}">${flight.time}</div>
                    <div class="col-span-4 led-text-amber tracking-tight truncate scramble-text" data-value="${flight.city}">${flight.city}</div>
                    <div class="col-span-2 text-neutral-400 font-light tracking-widest scramble-text" data-value="${flight.flight}">${flight.flight}</div>
                    <div class="col-span-1 text-center text-neutral-400 scramble-text" data-value="${flight.gate}">${flight.gate}</div>
                    <div class="col-span-3 text-right font-medium tracking-widest ${flight.statusColor} scramble-text" data-value="${flight.status}">${flight.status}</div>
                </li>
            `;
        }

        function renderBoard() {
            boardEl.innerHTML = currentFlights.map(createRowHTML).join('');
        }

        renderBoard();

        // Dot Matrix Scramble Animation Effect
        // Letters cycle through random characters before settling
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.:";
        
        function scrambleElement(element, finalValue) {
            let iterations = 0;
            const maxIterations = 10; // How long it scrambles
            
            const interval = setInterval(() => {
                element.innerText = finalValue
                    .split("")
                    .map((letter, index) => {
                        if(index < iterations) {
                            return finalValue[index];
                        }
                        if (letter === ' ') return ' ';
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");
                
                if(iterations >= finalValue.length) { 
                    clearInterval(interval);
                    element.innerText = finalValue; // Ensure clean end
                }
                
                iterations += 1/2; // Speed of resolve
            }, 30);
        }

        // Simulation Loop
        setInterval(() => {
            // 1. Remove top flight (departed)
            // 2. Add new flight at bottom
            // 3. Re-sort or shift visual
            
            // Only update occasionally
            if(Math.random() > 0.3) return;

            // Remove first, add new
            currentFlights.shift();
            currentFlights.push(generateFlight());
            
            // Simple sort by time for realism
            currentFlights.sort((a,b) => a.time.localeCompare(b.time));

            // Get all existing row elements
            const rowElements = Array.from(boardEl.children);

            // Update DOM in place to trigger animations only where needed
            currentFlights.forEach((flight, index) => {
                const li = rowElements[index];
                if (!li) return; // Should not happen if sync is correct

                // Check if this row needs visual update (data changed significantly)
                // We compare the 'data-id' to see if it's a new flight in this slot
                const oldId = li.getAttribute('data-id');
                
                if (oldId !== flight.id) {
                    // Update the row attributes
                    li.setAttribute('data-id', flight.id);
                    
                    // Update children
                    const cols = li.querySelectorAll('.scramble-text');
                    
                    // Time
                    if(cols[0].innerText !== flight.time) {
                        cols[0].className = `col-span-2 font-medium led-text-amber tracking-widest scramble-text`;
                        scrambleElement(cols[0], flight.time);
                    }
                    
                    // City
                    if(cols[1].innerText !== flight.city) {
                        scrambleElement(cols[1], flight.city);
                    }

                    // Flight
                    if(cols[2].innerText !== flight.flight) {
                        scrambleElement(cols[2], flight.flight);
                    }

                    // Gate
                    if(cols[3].innerText !== flight.gate) {
                        scrambleElement(cols[3], flight.gate);
                    }

                    // Status - needs color update too
                    const statusCol = cols[4];
                    if(statusCol.innerText !== flight.status) {
                        statusCol.className = `col-span-3 text-right font-medium tracking-widest scramble-text ${flight.statusColor}`;
                        scrambleElement(statusCol, flight.status);
                    }
                }
            });

        }, 3500); // Check for updates every 3.5 seconds

        // Clock
        setInterval(() => {
            const now = new Date();
            const timeStr = `${padZero(now.getHours())}:${padZero(now.getMinutes())}`;
            document.getElementById('clock').innerText = timeStr;
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-GB', {  day: 'numeric', month: 'short', year: 'numeric' }).toUpperCase();
        }, 1000);

        // Initial trigger for date
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('en-GB', {  day: 'numeric', month: 'short', year: 'numeric' }).toUpperCase();

    </script>

</body></html>
